# gitleaks configuration — prevents accidental API key commits.
# Used both by the pre-commit hook and the GitHub Actions check.

title = "RSS-Radar gitleaks config"

# Use the built-in rules (OpenAI, GitHub, AWS, Google, Slack, ... hundreds of patterns)
[extend]
useDefault = true

# Extra custom rules for the services we use
[[rules]]
id = "gemini-api-key"
description = "Google Gemini / Generative AI API Key"
regex = '''AIzaSy[A-Za-z0-9_\-]{33}'''
keywords = ["AIzaSy"]

[[rules]]
id = "groq-api-key"
description = "Groq Cloud API Key"
regex = '''gsk_[A-Za-z0-9]{48,}'''
keywords = ["gsk_"]

[[rules]]
id = "github-pat-fine-grained"
description = "GitHub Fine-grained Personal Access Token"
regex = '''github_pat_[A-Za-z0-9_]{82,}'''
keywords = ["github_pat_"]

# Allowlist (false positives in RSS feed URLs, docs placeholders, etc.)
[allowlist]
description = "Allowed paths and patterns"
paths = [
  '''docs/index\.html$''',     # Dashboard contains inline-config — only our own config
  '''data/items\.json$''',     # External paper contents, not our keys
  '''data/runs\.json$''',
]
regexes = [
  '''dummy-key-for-testing''',
  '''sk-...''',                # docs placeholders
  '''AIzaSy\.\.\.''',
  '''gsk_\.\.\.''',
  '''github_pat_\.\.\.''',
]

# Runs gitleaks automatically before every `git commit`.
# Installation:
#   pip install pre-commit
#   pre-commit install
# From then on, if you ever accidentally write an API key into a file,
# the commit is rejected and you have to fix it before pushing.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: ["--config", ".gitleaks.toml"]

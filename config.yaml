# RSS Radar - Konfigürasyon
# Araştırma alanı: Deprem sonrası betonarme yapılarda hasar tespiti (görüntü işleme)
#
# Bu dosyayı doğrudan elle düzenleyebilirsin, ama daha kolayı:
# Dashboard'u aç → sağ üst "⚙️ Ayarlar" → düzenle → "GitHub'a Kaydet"
# (Panel bu dosyayı YAML olarak güncelleyip commit'ler.)

profile:
  name: "Betonarme Hasar Tespiti - Görüntü İşleme"
  description: |
    Doktora konusu: Deprem sonrası oluşan betonarme yapılardaki hasarların
    görsel işleme/derin öğrenme metodları ile tespiti.

# Sistem her gün bu saatte (UTC) çalışacak. 17:00 UTC = 20:00 TR
schedule_utc: "0 17 * * *"

# Yerel saate göre tarama zamanı (panel'den ayarlanır, cron'a otomatik dönüşür)
schedule_local:
  hour: 20         # 0-23
  minute: 0        # 0-59
  tz_offset: 3     # UTC offset (Türkiye = +3)
  days: "*"        # "*" = her gün, ya da "1,2,3,4,5" gibi


# LLM ayarları (özet + skor için) — TAMAMEN ÜCRETSİZ
# Birincil: Google Gemini  (free tier, kredi kartı YOK, ~500 istek/gün)
# Yedek:    Groq Llama      (free tier, kredi kartı YOK, ~1000 istek/gün, ultra hızlı)
# Birincil hata verirse otomatik yedeğe düşer.
llm:
  provider: "gemini"
  model: "gemini-2.5-flash"
  fallback_provider: "groq"
  fallback_model: "llama-3.3-70b-versatile"
  language: "tr"
  max_items_per_run: 60
  relevance_threshold: 4

# ============================================================================
# ANAHTAR KELİMELER - 3 ağırlık seviyesi
# ============================================================================
# Toplam ön-skor = (critical eşleşme sayısı × 3) + (core × 2) + (related × 1)
#                  - (exclude eşleşme sayısı × 3)
# Ön-skor >= 2 olanlar LLM'e gider.
#
# Açıp kapatmak için satır başına # koy. Panel'den de toggle edebilirsin.

keywords:

  # --- KRİTİK (×3) - tezinin tam göbeği, mutlaka gör ---
  critical:
    - "post-earthquake"
    - "post earthquake"
    - "earthquake damage"
    - "seismic damage"
    - "reinforced concrete damage"
    - "RC building damage"
    - "rapid visual screening"
    - "rapid post-earthquake assessment"
    - "building damage assessment"
    - "damage classification"
    - "damage detection"
    - "crack detection"
    - "crack segmentation"
    - "crack quantification"
    - "crack width measurement"
    - "spalling detection"
    - "rebar exposure"
    - "concrete spalling"

  # --- ÇEKİRDEK (×2) - alanın bel kemiği ---
  core:
    # yapısal terimler
    - "reinforced concrete"
    - "RC column"
    - "RC beam"
    - "beam-column joint"
    - "shear wall"
    - "structural damage"
    - "structural health monitoring"
    - "SHM"
    - "damage state"
    - "damage index"
    - "damage level"
    - "EMS-98"
    - "FEMA"
    # CV/DL yöntemler (genel)
    - "computer vision"
    - "deep learning"
    - "convolutional neural network"
    - "semantic segmentation"
    - "instance segmentation"
    - "object detection"
    - "image classification"
    - "image processing"
    # popüler mimariler
    - "YOLO"
    - "Mask R-CNN"
    - "U-Net"
    - "vision transformer"
    - "ViT"
    - "Segment Anything"
    - "SAM model"
    - "CLIP"
    - "foundation model"
    - "vision language model"
    - "VLM"
    # platformlar
    - "UAV"
    - "drone inspection"
    - "aerial imagery"
    - "smartphone inspection"

  # --- İLGİLİ (×1) - bağlamsal ---
  related:
    - "concrete"
    - "earthquake"
    - "seismic"
    - "infrastructure"
    - "bridge inspection"
    - "tunnel inspection"
    - "non-destructive"
    - "NDT"
    - "transfer learning"
    - "data augmentation"
    - "dataset"
    - "benchmark"
    - "annotation"
    - "edge computing"
    - "real-time"
    - "explainable AI"
    - "XAI"
    - "uncertainty"
    - "domain adaptation"
    - "synthetic data"
    - "generative model"
    - "diffusion"
    - "self-supervised"
    - "few-shot"
    - "anomaly detection"
    - "drift estimation"
    - "displacement measurement"
    - "fragility"
    - "vulnerability assessment"
    - "retrofit"
    - "strengthening"
    - "masonry"      # bazen RC ile birlikte geçer
    - "BIM"
    - "point cloud"
    - "LiDAR"
    - "photogrammetry"

  # --- EXCLUDE (-×3) - konuyla alakasız ama ortak kelime içerebilen alanlar ---
  # Panel'den aç/kapat. Yorum satırı haline getirirsen exclude devre dışı kalır.
  exclude:
    # tıp
    - "medical imaging"
    - "chest x-ray"
    - "MRI"
    - "CT scan"
    - "tumor"
    - "cancer"
    - "lesion"
    - "histopathology"
    - "ultrasound"
    - "retinal"
    - "skin"
    - "lung nodule"
    - "white blood cell"
    - "wound tissue"
    - "fetal"
    - "BI-RADS"
    - "mammography"
    # biyoloji / tarım
    - "plant trait"
    - "leaf disease"
    - "crop"
    - "agriculture"
    - "weed detection"
    - "fruit detection"
    # uzaktan algılama (deprem dışı)
    - "satellite weather"
    - "cloud detection"
    - "land cover"
    - "vegetation index"
    - "ocean"
    - "atmospheric"
    # otonom araç / sürüş
    - "autonomous driving"
    - "self-driving"
    - "lane detection"
    - "pedestrian detection"
    - "traffic sign"
    - "dashcam"
    # insan/yüz
    - "face recognition"
    - "facial expression"
    - "pose estimation"
    - "gesture"
    - "person re-identification"
    - "human action"
    - "deepfake"
    # endüstri (alakasız)
    - "wind turbine"
    - "aerospace"
    - "x-ray tomography"
    - "PCB"
    - "additive manufacturing"
    - "3D printing"
    - "weld defect"
    - "fabric defect"
    - "textile"
    # askeri / güvenlik
    - "military"
    - "weapon"
    - "surveillance"
    - "anti-spoofing"
    # robotik
    - "robot manipulation"
    - "grasping"
    - "SLAM mapping"
    # diğer CV görevleri
    - "speech"
    - "audio"
    - "music"
    - "NLP"
    - "language model evaluation"
    - "recommendation"
    - "molecular"
    - "protein"
    - "drug"
    - "particle physics"
    - "jet tagging"
    - "high energy physics"


name: Daily RSS-Radar

on:
  schedule:
    - cron: "0 17 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    concurrency:
      group: rss-radar-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Scan for leaked secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: .gitleaks.toml
        continue-on-error: false

      - name: Run RSS-Radar
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_and_report.py

      - name: Commit results (with retry on conflict)
        run: |
          git config user.name  "rss-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            git add data/ docs/
            if git diff --staged --quiet; then
              echo "No changes."
              exit 0
            fi
            git commit -m "daily: scan results $(date -u +%Y-%m-%d-%H%M)"
            if git push; then
              echo "Pushed successfully on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, pulling and retrying..."
            git pull --rebase --strategy-option=ours
            sleep 2
          done
          echo "Failed to push after 5 attempts"
          exit 1
